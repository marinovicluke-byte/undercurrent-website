<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Default meta (home page) — overridden per route via React Helmet or inline script -->
    <title>UnderCurrent — AI Business Automation</title>
    <meta name="description" content="Melbourne-based AI automation studio. We map small business workflows and build custom AI-powered systems that run your operations — silently, continuously, precisely." />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#1C1C1A" />
    <link rel="canonical" href="https://undercurrent.au/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://undercurrent.au/" />
    <meta property="og:title" content="UnderCurrent — AI Business Automation" />
    <meta property="og:description" content="Melbourne-based AI automation studio. We map small business workflows and build custom AI-powered systems that run your operations — silently, continuously, precisely." />
    <meta property="og:image" content="https://undercurrent.au/og-image.jpg" />
    <meta property="og:site_name" content="UnderCurrent" />
    <meta property="og:locale" content="en_AU" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="UnderCurrent — AI Business Automation" />
    <meta name="twitter:description" content="Melbourne-based AI automation studio. We map small business workflows and build custom AI-powered systems that run your operations — silently, continuously, precisely." />
    <meta name="twitter:image" content="https://undercurrent.au/og-image.jpg" />

    <!-- Structured Data: LocalBusiness + WebSite -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "LocalBusiness",
          "@id": "https://undercurrent.au/#business",
          "name": "UnderCurrent",
          "alternateName": "UnderCurrent AI Automation",
          "description": "Melbourne-based AI automation studio specialising in workflow automation for small businesses — onboarding, customer experience, sales, content design, and personal assistant AI systems.",
          "url": "https://undercurrent.au",
          "logo": "https://undercurrent.au/favicon.svg",
          "image": "https://undercurrent.au/og-image.jpg",
          "address": {
            "@type": "PostalAddress",
            "addressLocality": "Melbourne",
            "addressRegion": "VIC",
            "addressCountry": "AU"
          },
          "areaServed": {
            "@type": "Country",
            "name": "Australia"
          },
          "serviceType": [
            "AI Business Automation",
            "Workflow Automation",
            "Business Process Automation",
            "AI Agent Deployment"
          ],
          "email": "hello@undercurrent.au",
          "foundingDate": "2021",
          "knowsAbout": [
            "AI automation",
            "workflow design",
            "CRM integration",
            "small business operations",
            "sales automation",
            "customer experience automation"
          ]
        },
        {
          "@type": "WebSite",
          "@id": "https://undercurrent.au/#website",
          "url": "https://undercurrent.au",
          "name": "UnderCurrent",
          "publisher": { "@id": "https://undercurrent.au/#business" }
        }
      ]
    }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400&display=swap" rel="stylesheet" />
    <!-- Prevent blank flash before JS loads -->
    <style>
      html, body { margin: 0; padding: 0; background: #E8E0D0; }
      #root { min-height: 100vh; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
